<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu Utama</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background-color: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      margin-bottom: 20px;
      color: #333;
    }
    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 90%;
      text-decoration: none;
      color: #fff;
    }
    .btn-info { background-color: #007bff; }
    .btn-success { background-color: #28a745; }
    .btn-warning { background-color: #ffc107; color: #212529; }
    .btn-back { background-color: #6c757d; }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Menu Pengisian Data</h1>

    <!-- Tombol ke Form 1 -->
    <a href="https://forms.gle/PAMurPUREyayXMw97" class="btn btn-info">Form Data 1</a>

    <!-- Tombol ke Form 2 -->
    <a href="https://forms.gle/5y7v9cnBpxD2DfvC7" class="btn btn-success">Form Data 2</a>

        <!-- Tombol ke Summary -->
    <a href="https://datastudio.google.com/reporting/ab27ecbe-9b30-42b2-8916-e1b51bb90788" class="btn btn-success">Liat Summary</a>

    <!-- Tombol kembali ke halaman utama -->
    <a href="index.html" class="btn btn-back">Kembali ke Halaman Utama</a>
  </div>
</body>
</html>
