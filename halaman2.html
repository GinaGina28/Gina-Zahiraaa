<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Demografi</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #4ecdc4, #44a08d); padding: 20px; margin: 0; }
        form { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #44a08d; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { border-color: #4ecdc4; outline: none; }
        .row { display: flex; gap: 10px; }
        .row select { flex: 1; }
        .jenis-transaksi { display: flex; gap: 15px; margin: 10px 0; }
        .jenis-transaksi input[type="radio"] { width: auto; }
        .jenis-transaksi label { margin: 0; font-weight: normal; }
        button { background: linear-gradient(45deg, #ff6b6b, #4ecdc4); color: white; padding: 15px 30px; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; transition: transform 0.3s; }
        button:hover { transform: scale(1.02); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #44a08d; color: white; }
    </style>
</head>
<body>
    <form id="formDemografi" action="submit.php" method="POST">
        <h2>📊 Data Demografi & Keuangan</h2>

        <!-- Biodata Dasar -->
        <label for="nama">1. Nama Pengguna:</label>
        <input type="text" id="nama" name="nama" required>

        <label>2. Tanggal Lahir:</label>
        <div class="row">
            <select id="hari" name="hari" required><option value="">Hari</option>
                <script>for(let i=1;i<=31;i++) document.write(`<option value="${i}">${i}</option>`);</script>
            </select>
            <select id="bulan" name="bulan" required><option value="">Bulan</option>
                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option value="4">April</option>
                <option value="5">Mei</option><option value="6">Juni</option><option value="7">Juli</option><option value="8">Agustus</option>
                <option value="9">September</option><option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
            </select>
            <select id="tahun" name="tahun" required><option value="">Tahun</option>
                <script>for(let y=1950;y<=2026;y++) document.write(`<option value="${y}">${y}</option>`);</script>
            </select>
        </div>

        <label for="alamat">3. Alamat:</label>
        <textarea id="alamat" name="alamat" rows="3" required></textarea>

        <label for="telpon">4. No. Telepon:</label>
        <input type="tel" id="telpon" name="telpon" pattern="[0-9]{10,13}" required>

        <label for="email">5. Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="pendidikan">6. Pendidikan:</label>
        <select id="pendidikan" name="pendidikan" required>
            <option value="">Pilih Tingkat Pendidikan</option>
            <option value="SD">SD</option>
            <option value="SMP">SMP</option>
            <option value="SMA/SMK">SMA/SMK</option>
            <option value="D3">D3</option>
            <option value="S1">S1 (Sarjana)</option>
            <option value="S2">S2 (Magister)</option>
            <option value="S3">S3 (Doktor)</option>
        </select>
        <div style="margin-bottom: 20px;">
        <a href="halaman 2 (1).html" style="text-decoration: none;">
            <button type="button" style="background-color: #fbec66; color:#2c3e50; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">
             Lanjutkan
            </button>
        </a>
    </div>
    <div id="output"></div>
    </form>
<div class="menu-nav">
    <a href="halaman1.html">⬅️ Tugas 1</a>
    <a href="index.html" class="home-btn">🏠 Home</a>
    <div style="margin-bottom: 20px;">
        <a href="halaman1.html" style="text-decoration: none;">
            <button type="button" style="background-color: #fbec66; color:#2c3e50; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">
                ← Kembali
            </button>
        </a>
    </div>
    <script>
        // Fungsi tambah baris transaksi (copy dropdown dari yang pertama)
        function tambahTransaksi() {
            const tbody = document.querySelector('#transaksiTable tbody');
            const row = tbody.rows[0].cloneNode(true);
            const index = tbody.rows.length;
            row.querySelectorAll('input, select')[0].name = `jenis_transaksi[${index}]`;
            row.querySelectorAll('select')[0].name = `tgl_transaksi_hari[${index}]`;
            row.querySelectorAll('select')[1].name = `tgl_transaksi_bulan[${index}]`;
            row.querySelectorAll('select')[2].name = `tgl_transaksi_tahun[${index}]`;
            row.querySelector('input[name*="uraian"]').name = `uraian[${index}]`;
            row.querySelector('input[name*="debet"]').name = `debet[${index}]`;
            row.querySelector('input[name*="kredit"]').name = `kredit[${index}]`;
            tbody.appendChild(row);
        }
    </script>
</body>
</html>
