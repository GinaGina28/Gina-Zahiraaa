<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Tugas - Gina Zahira</title>
    <style>
        :root {
            --sage-mint: #b2d8b2;
            --dusty-pink: #f4c2c2;
            --lavender-sage: #d7e1d6;
            --sage-core: #8ba88b;
            --blush-dust: #f5d5d5;
            --ocean-blue: #4a90e2;
            --shadow-sage: 0 20px 45px rgba(178,216,178,0.25);
            --shadow-ocean: 0 20px 45px rgba(74,144,226,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Playfair Display', 'Georgia', serif; 
            background: linear-gradient(135deg, var(--sage-mint) 0%, var(--dusty-pink) 45%, var(--lavender-sage) 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 25px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(178,216,178,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(244,194,194,0.25) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(215,225,214,0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
            animation: gentleBreathe 8s ease-in-out infinite;
        }
        @keyframes gentleBreathe {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }
        .container { 
            background: 
                linear-gradient(145deg, rgba(255,255,255,0.85), rgba(247,247,247,0.95)),
                url('image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="%23f0f0f0" opacity="0.3"/><circle cx="75" cy="75" r="0.8" fill="%23e8e8e8" opacity="0.2"/><circle cx="50" cy="10" r="0.5" fill="%23f5f5f5" opacity="0.4"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>'); 
            backdrop-filter: blur(12px); 
            padding: 75px 55px; 
            border-radius: 40px; 
            box-shadow: var(--shadow-sage); 
            max-width: 580px; 
            width: 100%;
            border: 1px solid rgba(139,168,139,0.3);
            position: relative;
            z-index: 2;
        }
        .header { 
            text-align: center; 
            margin-bottom: 55px; 
        }
        .floral-accent { 
            font-size: 3.8em; 
            background: linear-gradient(135deg, var(--sage-core) 0%, var(--dusty-pink) 50%, var(--sage-mint) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 25px; 
            display: block;
            filter: drop-shadow(0 4px 12px rgba(139,168,139,0.3));
            animation: petalFloat 4s ease-in-out infinite;
        }
        @keyframes petalFloat {
            0%, 100% { transform: rotate(-2deg) translateY(0px); }
            50% { transform: rotate(2deg) translateY(-4px); }
        }
        h1 { 
            color: var(--sage-core); 
            font-size: 2.6em; 
            font-weight: 400; 
            letter-spacing: 3px; 
            margin-bottom: 12px;
            text-shadow: 0 3px 15px rgba(0,0,0,0.08);
        }
        .prodi { 
            color: var(--dusty-pink); 
            font-weight: 600; 
            font-size: 1.15em;
            text-shadow: 0 1px 4px rgba(244,194,194,0.4);
        }
        
        .daftar-buttons { 
            display: flex; 
            flex-direction: column; 
            gap: 35px;
        }
        .tugas-btn { 
            position: relative; 
            padding: 30px 45px; 
            font-size: 1.45em; 
            font-weight: 500; 
            border: 2px solid rgba(255,255,255,0.6); 
            border-radius: 30px; 
            cursor: pointer; 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            transition: all 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            overflow: hidden;
            font-family: inherit;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .tugas-btn::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 0; 
            height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); 
            transition: width 0.7s;
        }
        .tugas-btn:hover::before { width: 100%; }
        
        .tugas1 { 
            background: linear-gradient(135deg, var(--lavender-sage) 0%, var(--sage-mint) 100%); 
            color: var(--sage-core); 
        }
        .tugas1:hover { 
            transform: translateY(-12px) scale(1.04); 
            border-color: var(--dusty-pink); 
            box-shadow: var(--shadow-sage);
        }
        
        .tugas2 { 
            background: linear-gradient(135deg, var(--dusty-pink) 0%, var(--blush-dust) 100%); 
            color: var(--sage-core); 
        }
        .tugas2:hover { 
            transform: translateY(-12px) scale(1.04); 
            border-color: var(--sage-mint); 
            box-shadow: 0 25px 55px rgba(244,194,194,0.35);
        }
        
        .tugas3 { 
            background: linear-gradient(135deg, var(--ocean-blue) 0%, #66b3ff 100%); 
            color: white; 
        }
        .tugas3:hover { 
            transform: translateY(-12px) scale(1.04); 
            border-color: var(--sage-mint); 
            box-shadow: var(--shadow-ocean);
        }
        
        .btn-icon { 
            font-size: 2.1em; 
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
        }
        .btn-title { 
            font-size: 1.25em; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: 700;
        }
        .btn-subtitle { 
            font-size: 0.92em; 
            opacity: 0.92; 
            font-weight: 300; 
            letter-spacing: 1px;
            font-style: italic;
        }
        
        .home-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(139, 168, 139, 0.8);
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(139,168,139,0.3);
            transition: all 0.3s ease;
            z-index: 10;
            font-family: inherit;
        }
        .home-btn:hover {
            transform: scale(1.1);
            background: var(--sage-core);
        }
        
        footer { 
            margin-top: 85px; 
            color: var(--sage-core); 
            font-size: 1em; 
            font-weight: 500;
            font-style: italic;
            letter-spacing: 1px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        
        @media (max-width: 520px) {
            .container { padding: 60px 40px; margin: 20px; }
            h1 { font-size: 2.2em; }
            .floral-accent { font-size: 3em; }
            .home-btn { bottom: 20px; right: 20px; padding: 12px 16px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="floral-accent">🌸</div>
            <h1>Gina Zahira</h1>
            <p class="prodi">Sosial Ekonomi Perikanan • Universitas Lambung Mangkurat</p>
        </div>
        
        <div class="daftar-buttons">
            <a href="halaman1.html" class="tugas-btn tugas1" target="_blank">
                <span class="btn-icon">📈</span>
                <span class="btn-title">Tugas 1</span>
                <span class="btn-subtitle">Biodata</span>
            </a>
            <a href="halaman2.html" class="tugas-btn tugas2" target="_blank">
                <span class="btn-icon">🐠</span>
                <span class="btn-title">Tugas 2</span>
                <span class="btn-subtitle">Demografi Keuangan</span>
            </a>
            <a href="gform.html" class="tugas-btn tugas3" target="_blank">
                <span class="btn-icon">📋</span>
                <span class="btn-title">Tugas 3</span>
                <span class="btn-subtitle">Google Form</span>
            </a>
        </div>
    </div>
    <a href="index.html" class="home-btn">🏠 Home</a>
    <footer>
        <p>🌿 Tugas Sistem-2026</p>
    </footer>
</body>
</html>
